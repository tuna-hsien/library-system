# =====================================================
# Server
# =====================================================
server.port=${PORT:8080}

# =====================================================
# SQLite DataSource
# =====================================================
# 連線到專案根目錄下的 library.db 檔案，若不存在會自動建立
spring.datasource.url=jdbc:sqlite:library.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# =====================================================
# JPA / Hibernate
# =====================================================
# SQLite 沒有原生的 Hibernate Dialect，需使用 community dialects 套件提供的 SQLiteDialect
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# update：啟動時依 Entity 自動建表/補欄位；正式環境建議改為 validate 並搭配 Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQLite 對單一寫入連線較敏感，避免連線池並發寫入造成 lock，限制連線池大小
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000

# =====================================================
# Gemini API 設定
# =====================================================
# 請至 https://aistudio.google.com/app/apikey 取得金鑰，並改用環境變數注入，避免將金鑰寫入版控
# 如果找不到環境變數，就會直接使用冒號後面的金鑰
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=gemini-2.0-flash
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models

# =====================================================
# Logging
# =====================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.library=DEBUG